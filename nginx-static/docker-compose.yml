services:
  nginx-static:
    image: nginx:1.25-alpine
    container_name: my_static_server
    restart: always

    ports:
      - "${NGINX_STATIC_PORT:-90}:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

      - ./storage:/usr/share/nginx/html/media

networks:
  default:
    name: my_static_network