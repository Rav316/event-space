services:
  event-space-db:
    image: postgres:18
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--locale=en_US.UTF-8 --encoding=UTF8
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - my_network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    profiles:
      - observability
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@event-space-db:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - event-space-db
    networks:
      - my_network

  event-space-api:
    build:
      context: ./services/event-space-api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - event-space-db
      - rabbitmq
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://event-space-db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - STATIC_CONTENT_PATH=/storage
      - PROMETHEUS_USERNAME=${PROMETHEUS_USERNAME}
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - OTEL_SERVICE_NAME=event-space-api
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=${OTEL_TRACES_EXPORTER:-none}
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_MDC_ATTRIBUTES=*
    volumes:
      - ./services/nginx-static-service/storage:/storage
      - event_space_api_logs:/app/logs
    networks:
      - my_network

  email-notification-service:
    build:
      context: ./services/email-notification-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      - rabbitmq
    environment:
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - MAIL_FROM=${MAIL_FROM}
      - PROMETHEUS_USERNAME=${PROMETHEUS_USERNAME}
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - OTEL_SERVICE_NAME=email-notification-service
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=${OTEL_TRACES_EXPORTER:-none}
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_MDC_ATTRIBUTES=*
    volumes:
      - email_notification_service_logs:/app/logs
    networks:
      - my_network

  placeholder:
    build:
      context: ./services/placeholder-service
    container_name: placeholder_service
    restart: always
    networks:
      - my_network

  nginx-static:
    image: nginx:1.25-alpine
    container_name: my_static_server
    restart: always
    ports:
      - "127.0.0.1:${NGINX_STATIC_PORT:-90}:80"
    volumes:
      - ./services/nginx-static-service/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx-static-service/storage:/usr/share/nginx/html/media
      - ./services/nginx-static-service/init-content:/usr/share/nginx/html/media/init:ro
      - ./services/nginx-static-service/cache:/var/cache/nginx
    depends_on:
      - placeholder
    networks:
      - my_network

  event-space-app:
    build:
      context: ./event-space-app
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - event-space-api
      - nginx-static
    restart: always
    networks:
      - my_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
    - "127.0.0.1:5672:5672"
    - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - my_network

  grafana:
    image: grafana/grafana
    profiles:
      - observability
    ports:
      - "3001:3000"
    user: "root"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - my_network

  prometheus:
    image: prom/prometheus
    profiles:
      - observability
    ports:
      - "9090:9090"
    user: "root"
    environment:
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mkdir -p /etc/prometheus/secrets &&
        echo "$$PROMETHEUS_PASSWORD" > /etc/prometheus/secrets/prometheus_basic_auth_password &&
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    volumes:
      - prometheus_data:/prometheus
      - ./services/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - my_network

  loki:
    image: grafana/loki
    profiles:
      - observability
    ports:
      - "3100:3100"
    user: "root"
    volumes:
      - loki_data:/loki
      - ./services/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - my_network

  alloy:
    image: grafana/alloy:latest
    profiles:
      - observability
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - event_space_api_logs:/var/log/event-space-api:ro
      - email_notification_service_logs:/var/log/email-notification-service:ro
    command: run /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks:
      - my_network

  tempo:
    image: grafana/tempo:2.10.4
    profiles:
      - observability
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./services/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (queries)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - my_network

networks:
  my_network:
    name: my_network

volumes:
  rabbitmq_data:
  grafana_data:
  prometheus_data:
  loki_data:
  postgres_data:
  static_content_data:
  event_space_api_logs:
  email_notification_service_logs:
  tempo_data:
