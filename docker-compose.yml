services:
  placeholder:
    build:
      context: ./placeholder-service
    container_name: placeholder_service
    restart: always
    networks:
      - my_network

  nginx-static:
    image: nginx:1.25-alpine
    container_name: my_static_server
    restart: always
    ports:
      - "${NGINX_STATIC_PORT:-90}:80"
    volumes:
      - ./nginx-static/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-static/storage:/usr/share/nginx/html/media
      - ./nginx-static/cache:/var/cache/nginx
    depends_on:
      - placeholder
    networks:
      - my_network


networks:
  my_network:
    name: my_network
