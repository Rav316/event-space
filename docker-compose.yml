services:
  placeholder:
    build:
      context: ./services/placeholder-service
    container_name: placeholder_service
    restart: always
    networks:
      - my_network

  nginx-static:
    image: nginx:1.25-alpine
    container_name: my_static_server
    restart: always
    ports:
      - "${NGINX_STATIC_PORT:-90}:80"
    volumes:
      - ./services/nginx-static-service/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx-static-service/storage:/usr/share/nginx/html/media
      - ./services/nginx-static-service/cache:/var/cache/nginx
    depends_on:
      - placeholder
    networks:
      - my_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
    - "5672:5672"
    - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  my_network:
    name: my_network

volumes:
  rabbitmq_data: