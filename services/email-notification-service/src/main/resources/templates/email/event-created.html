<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новое мероприятие</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #020817;
        }

        .wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background-color: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            padding: 32px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        h2 {
            margin: 0 0 16px;
            font-size: 22px;
            font-weight: 600;
            line-height: 1.3;
            color: #020817;
        }

        p {
            margin: 8px 0;
            font-size: 15px;
            line-height: 1.6;
            color: #334155;
        }

        .meta {
            margin-top: 12px;
            padding: 12px 16px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .meta strong {
            color: #020817;
            font-weight: 500;
        }

        .image-section {
            margin: 20px 0;
            text-align: center;
        }

        .image-section img {
            max-width: 100%;
            border-radius: 12px;
        }

        .button-wrapper {
            margin-top: 24px;
            text-align: center;
        }

        .button {
            display: inline-block;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            background-color: #020817;
            border-radius: 10px;
            text-decoration: none;
        }

        .button:hover {
            background-color: #09090b;
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            line-height: 1.5;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <h2 th:text="'Новое мероприятие: ' + ${message.name}">
            Новое мероприятие: Название
        </h2>

        <div class="meta">
            <p>
                <strong>Дата:</strong>
                <span th:text="${eventDate}">01.01.2026</span>
            </p>
            <p>
                <strong>Время:</strong>
                <span th:text="${startTime}">10:00</span>
                —
                <span th:text="${endTime}">12:00</span>
            </p>
        </div>

        <p th:text="${message.shortDescription}">
            Краткое описание мероприятия
        </p>

        <div class="button-wrapper">
            <a th:href="${eventUrl}"
               target="_blank"
               style="
               display:inline-block;
               padding:12px 20px;
               font-size:14px;
               font-weight:500;
               color:#ffffff !important;
               background-color:#020817;
               border-radius:10px;
               text-decoration:none !important;
           ">

            Перейти к мероприятию
            </a>
        </div>

        <p class="footer">
            Это автоматическое письмо.
            Чтобы отключить уведомления о новых мероприятиях,
            измените настройки в профиле.
        </p>
    </div>
</div>
</body>
</html>
