apiVersion: 1

# Wipe any previously-provisioned versions so the explicit UIDs below take
# hold even on existing grafana_data volumes (old entries had auto-generated
# UIDs that would not match the cross-datasource references we now rely on).
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: loki
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      # Pull the traceId out of Spring Boot JSON log lines and link to Tempo.
      derivedFields:
        - name: traceId
          matcherRegex: '"traceId"\s*:\s*"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace in Tempo'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      # Jump from a trace span to the corresponding Loki log lines.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        filterBySpanID: false
      search:
        hide: false
